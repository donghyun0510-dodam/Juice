name: Weekly Economic Calendar
on:
  schedule:
    - cron: "0 21 * * 6"   # 매주 일요일 06:00 KST (토요일 21:00 UTC)
  workflow_dispatch:

concurrency:
  group: sheet-writer
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      GOOGLE_OAUTH_TOKEN_B64: ${{ secrets.GOOGLE_OAUTH_TOKEN_B64 }}
      GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
      GSHEET_FOLDER_ID: ${{ secrets.GSHEET_FOLDER_ID }}
      RULES_DEPLOY_KEY: ${{ secrets.RULES_DEPLOY_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Run weekly calendar
        run: python weekly_calendar.py
