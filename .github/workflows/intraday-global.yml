name: Intraday Scan - Global
on:
  schedule:
    # 미국 현물장 KST 22:30~05:00 ≒ UTC 13:30~20:00 (DST시 14:30~21:00 포함)
    - cron: "*/10 13-21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: sheet-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      GOOGLE_OAUTH_TOKEN_B64: ${{ secrets.GOOGLE_OAUTH_TOKEN_B64 }}
      GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
      GSHEET_FOLDER_ID: ${{ secrets.GSHEET_FOLDER_ID }}
      RULES_DEPLOY_KEY: ${{ secrets.RULES_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Intraday scan (global)
        run: python intraday_scan.py --market global

      - name: Commit-back state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signal_snapshot.json long_sign_seen.json 2>/dev/null || true
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "chore: intraday-global state update [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "push attempt $i failed, retrying…"; sleep 5
          done
          exit 1
