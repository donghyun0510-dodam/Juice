name: Scouter Timeseries & Performance
on:
  schedule:
    # 기록은 여전히 '일 1회'다 — notifier의 22h 가드가 중복 append를 막는다.
    # 회차를 3번 두는 이유: 미국 종가 직후엔 원자재 정산 일별 바가 아직 D-1까지만
    # 게시된 날이 많고(LME 현물 구리 상습), scouter_logger의 게시 가드가 그런 회차를
    # 스킵하기 때문이다. 게시 시각이 일정하지 않아 '한 번 더 늦게'로는 못 맞춘다.
    # 정각 부근은 GH 부하로 스킵되기 쉬워 분(minute)을 분산한다.
    - cron: "17 20 * * 1-5"   # ≈KST 화~토 05:17 — 1차. 바 미게시면 스킵되는 게 정상
    - cron: "30 0 * * 2-6"    # ≈KST 화~토 09:30 — 2차 (settled-backfill과 동일 시각대)
    - cron: "0 4 * * 2-6"     # ≈KST 화~토 13:00 — 3차(최후)
  workflow_dispatch:
    inputs:
      force_append:
        description: "일 1회 가드 무시하고 강제 append (디버그)"
        type: boolean
        default: false

concurrency:
  group: sheet-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      GOOGLE_OAUTH_TOKEN_B64: ${{ secrets.GOOGLE_OAUTH_TOKEN_B64 }}
      GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
      GSHEET_FOLDER_ID: ${{ secrets.GSHEET_FOLDER_ID }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      GMAIL_ADDR: ${{ secrets.GMAIL_ADDR }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Write SA credentials
        run: printf '%s' "$GOOGLE_SA_JSON" > sa_credentials.json

      - name: Log scouter timeseries
        env:
          FORCE_APPEND: ${{ inputs.force_append && '1' || '' }}
        run: python scouter_logger.py

      - name: Commit-back alert state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add macro_alert_state.json macro_snapshot.json 2>/dev/null || true
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "chore: scouter alert state update [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "push attempt $i failed, retrying…"; sleep 5
          done
          exit 1
