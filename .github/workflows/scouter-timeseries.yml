name: Scouter Timeseries & Performance
on:
  schedule:
    # 60분 간격 — 매시 17분 (UTC). 정각 부근은 GH 부하로 스킵되기 쉬워 분산.
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      force_append:
        description: "60분 가드 무시하고 강제 append (디버그)"
        type: boolean
        default: false

concurrency:
  group: sheet-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      GOOGLE_OAUTH_TOKEN_B64: ${{ secrets.GOOGLE_OAUTH_TOKEN_B64 }}
      GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
      GSHEET_FOLDER_ID: ${{ secrets.GSHEET_FOLDER_ID }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Write SA credentials
        run: printf '%s' "$GOOGLE_SA_JSON" > sa_credentials.json

      - name: Log scouter timeseries
        env:
          FORCE_APPEND: ${{ inputs.force_append && '1' || '' }}
        run: python scouter_logger.py

      - name: Commit-back alert state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add macro_alert_state.json 2>/dev/null || true
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "chore: scouter alert state update [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "push attempt $i failed, retrying…"; sleep 5
          done
          exit 1
