name: Daily Review - Korea
on:
  schedule:
    - cron: "17 7 * * 1-5"  # 16:17 KST (07:17 UTC) · 월~금 — 정각 혼잡 회피
  workflow_dispatch:

concurrency:
  group: sheet-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      GOOGLE_OAUTH_TOKEN_B64: ${{ secrets.GOOGLE_OAUTH_TOKEN_B64 }}
      GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
      GSHEET_FOLDER_ID: ${{ secrets.GSHEET_FOLDER_ID }}
      RULES_DEPLOY_KEY: ${{ secrets.RULES_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run daily review (korea)
        run: python daily_review.py --korea-only

      - name: Commit-back state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signal_snapshot.json macro_snapshot.json long_sign_seen.json kr_promotion_tracker.json 2>/dev/null || true
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "chore: daily-korea state update [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "push attempt $i failed, retrying…"; sleep 5
          done
          exit 1
