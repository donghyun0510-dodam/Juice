name: Intraday Scan - Korea
on:
  schedule:
    # 국장 KST 09:00~15:30 ≒ UTC 00:00~06:30
    - cron: "*/10 0-6 * * 1-5"
  workflow_dispatch:

concurrency:
  group: sheet-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
      GSHEET_FOLDER_ID: ${{ secrets.GSHEET_FOLDER_ID }}
      RULES_DEPLOY_KEY: ${{ secrets.RULES_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Intraday scan (korea)
        run: python intraday_scan.py --market korea

      - name: Commit-back state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signal_snapshot.json long_sign_seen.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: intraday-korea state update [skip ci]"
            git push
          fi
